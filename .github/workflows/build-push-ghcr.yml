name: Build & Publish (single-arch to GHCR)

on:
  push:
    tags: ["v*"]
    branches: [main]
  release:
    types: [published]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: slam-plugin

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/
      - run: ruff format --check src/

  build:
    name: Build per-arch
    # Runs on every event, incl. PRs, so a PR proves the image still builds.
    # It only LOGS IN and PUBLISHES on a release or a v* tag push (see PUBLISH
    # below) — PRs and push-to-main build for validation/cache only and never
    # touch the registry.
    needs: lint
    env:
      PUBLISH: ${{ github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: ubuntu-latest
            platforms: linux/amd64
            suffix: amd64
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure SLAM-SIGSIM submodule present
        # The lib/slam-sigsim submodule currently has no committed gitlink, so
        # `submodules: recursive` may not populate it. Clone it directly if empty.
        run: |
          if [ ! -d lib/slam-sigsim/sub_python ]; then
            echo "SLAM-SIGSIM submodule missing; cloning directly"
            rm -rf lib/slam-sigsim
            git clone --depth 1 https://github.com/blfitzgerald/SLAM-SIGSIM.git lib/slam-sigsim
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        # Only authenticate when we actually publish.
        if: env.PUBLISH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tag version
        if: env.PUBLISH == 'true'
        id: version
        run: |
          ref="${GITHUB_REF_NAME}"
          v="${ref#v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "minor=${v%.*}" >> "$GITHUB_OUTPUT"
          echo "major=${v%%.*}" >> "$GITHUB_OUTPUT"

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}-${{ matrix.suffix }},enable=${{ env.PUBLISH == 'true' }}
            type=raw,value=${{ steps.version.outputs.minor }}-${{ matrix.suffix }},enable=${{ env.PUBLISH == 'true' }}
            type=raw,value=${{ steps.version.outputs.major }}-${{ matrix.suffix }},enable=${{ env.PUBLISH == 'true' }}
            type=raw,value=latest-${{ matrix.suffix }},enable=${{ env.PUBLISH == 'true' }}
            type=raw,value=latest,enable=${{ env.PUBLISH == 'true' }}
            type=sha,format=long,prefix=,suffix=-${{ matrix.suffix }}

      - name: Build image (publish on release/tag only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platforms }}
          # Publish to GHCR only on a release or v* tag; other events build for validation/cache.
          push: ${{ env.PUBLISH == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
